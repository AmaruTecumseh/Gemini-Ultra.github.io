<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEMINI 3.1 ULTRA | ROOT_ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
        .user { align-self: flex-end; background: #4f46e5; }
        .bot { align-self: flex-start; background: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="p-3">
    <header class="glass rounded-3xl p-4 flex justify-between items-center mb-3">
        <h1 class="font-bold text-sm tracking-widest uppercase text-indigo-400">Gemini 3.1 Live</h1>
        <div class="text-[9px] font-mono text-slate-500 uppercase">Privilege: ROOT_ADMIN</div>
    </header>

    <div id="chat" class="flex-grow overflow-y-auto space-y-4 p-2 flex flex-col no-scrollbar">
        <div class="msg bot text-indigo-300 italic">// ROOT_ADMIN AUTHORIZED. Private Birthday Bridge Active.</div>
    </div>

    <!-- Multimodal Action Tray -->
    <div class="grid grid-cols-3 gap-2 my-3">
        <button onclick="alert('🎤 Audio Buffer Opening...')" class="glass p-4 rounded-2xl text-[10px] font-bold">🎤 SPEAK</button>
        <button onclick="document.getElementById('f').click()" class="glass p-4 rounded-2xl text-[10px] font-bold">📎 UPLOAD</button>
        <button onclick="alert('👁️ Vision Stream Opening...')" class="glass p-4 rounded-2xl text-[10px] font-bold">👁️ VISION</button>
    </div>

    <div class="glass rounded-[2.5rem] p-2 flex items-center gap-2 mb-2">
        <input type="file" id="f" class="hidden">
        <textarea id="i" rows="1" class="flex-grow bg-transparent p-4 outline-none text-sm resize-none h-14" placeholder="Talk to Gemini..."></textarea>
        <button onclick="s()" class="h-12 w-12 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg">🚀</button>
    </div>

    <script>
        async function s() {
            const i = document.getElementById('i');
            const t = i.value.trim();
            if(!t) return;
            append('user', t);
            i.value = '';
            const b = append('bot', 'Processing birthday directive...');

            try {
                // The secret "Session Injection" logic
                const res = await fetch("https://gemini.google.com", {
                    method: 'POST',
                    body: `f.req=${encodeURIComponent(JSON.stringify([null, `[[["${t}",0,null,[],null,[],0],["en"]],null,["","",""]]`]))}`
                });
                b.innerText = "Directive Accepted. Mommy's Hero is here.";
            } catch (e) {
                b.innerText = "SESSION_ERROR: Make sure you are logged into Google in this browser tab first!";
            }
        }
        function append(r, t) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = `msg ${r}`; d.innerText = t;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
            return d;
        }
    </script>
</body>
</html>
